<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSocket | Chat Corporativo</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    
    <div id="login-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>TeamSocket</h2>
            <p>Inicia sesión para continuar</p>
            
            <button id="modal-google-btn" class="btn google-btn">Continuar con Google</button>
            
            <div class="divider"><span>O</span></div>
            
            <input type="text" id="guest-name-input" placeholder="Tu nombre (opcional)">
            <button id="modal-guest-btn" class="btn guest-btn">Entrar como Invitado</button>
        </div>
    </div>
    <div class="app-wrapper">
        <header class="navbar">
            <div class="brand-center">
                <img id="themeLogo" src="assets/dark_logo.png" alt="TeamSocket Logo" class="theme-logo">
            </div>

            <div class="theme-control">
                <label for="themeSelect">Tema: </label>
                <select id="themeSelect">
                    <option value="default">Predeterminado</option>
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </div>

            <div class="user-auth">
                <span id="user-name-display">Cargando...</span>
                
                <button id="open-login-btn" class="login-btn" style="margin-left: 10px;">Iniciar Sesión</button>
                
                <button id="logout-btn" class="login-btn" style="display: none; background-color: #dc3545; margin-left: 10px;">Cerrar Sesión</button>
            </div>
        </header>

        <main class="main-container">
            <aside class="sidebar">
                <h3>Colaboradores</h3>
                <ul id="user-list">
                    <li><span class="status online"></span> Red local (WebSocket)</li>
                </ul>
            </aside>

            <section class="chat-container">
                <div id="messages" class="messages-area">
                    <div class="message system">Bienvenido al canal de TeamSocket. Inicia sesión para chatear.</div>
                </div>
                
                <form id="chat-form" class="input-group" onsubmit="event.preventDefault();">
                    <input type="text" id="messageInput" placeholder="Escribe un mensaje aquí..." required>
                    <button type="button" onclick="sendMessage()" id="send-btn">Enviar</button>
                </form>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="login.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
