<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeamSocket | Chat Corporativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="navbar">
            <div class="logo">Team<span>Socket</span></div>
            <div class="user-auth">
                <span id="user-name">Invitado</span>
                <button class="login-btn">Acceder con Google</button>
            </div>
        </header>

        <main class="main-container">
            <aside class="sidebar">
                <h3>Colaboradores</h3>
                <ul id="user-list">
                    <li><span class="status online"></span> Usuario_1234 (Tú)</li>
                    <li><span class="status online"></span> Usuario_8821</li>
                    <li><span class="status offline"></span> Usuario_4402</li>
                </ul>
            </aside>

            <section class="chat-container">
                <div id="chat-messages" class="messages-area">
                    <div class="message system">Bienvenido al canal de colaboración técnica de TeamSocket.</div>
                    <div class="message other">
                        <span class="sender">Usuario_8821:</span>
                        <p>Hola equipo, ¿cómo va el progreso del sistema?</p>
                    </div>
                </div>
                
                <form id="chat-form" class="input-group">
                    <input type="text" id="message-input" placeholder="Escribe un mensaje aquí..." required>
                    <button type="submit" id="send-btn">Enviar</button>
                </form>
            </section>
        </main>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
